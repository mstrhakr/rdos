name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pretest:
    name: Pretest (Hosted)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pretest dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run pretest
        run: |
          chmod +x ci/*.sh
          bash ./ci/pipeline.sh pretest --mode ci --shellcheck-severity error --no-deps

  build-and-validate:
    name: Build + Validate (Self-Hosted)
    needs: pretest
    runs-on:
      - self-hosted
      - linux
      - uftc-builder
    timeout-minutes: 180
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify runner toolchain
        run: |
          set -euo pipefail
          for cmd in bash docker xorriso qemu-img zstd curl lsblk findmnt shellcheck; do
            if ! command -v "$cmd" >/dev/null 2>&1; then
              echo "Missing required command: $cmd" >&2
              exit 1
            fi
          done

      - name: Ensure permissions
        run: |
          chmod +x build.sh build-installer-iso.sh d2vm
          chmod +x ci/*.sh

      - name: Run full pipeline
        run: |
          bash ./ci/pipeline.sh all --mode ci --shellcheck-severity error

      - name: Upload VHD artifact
        uses: actions/upload-artifact@v4
        with:
          name: uftc-vhd
          path: uftc.vhd
          if-no-files-found: error
          retention-days: 7

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: uftc-installer-iso
          path: uftc-installer.iso
          if-no-files-found: error
          retention-days: 7
