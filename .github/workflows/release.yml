name: Release

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

permissions:
  contents: write
  packages: write

jobs:
  detect-release-context:
    name: Detect Release Context & Version
    runs-on: [self-hosted, linux, rdos-builder]
    if: >-
      github.repository == 'mstrhakr/RDOS' &&
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.repository.full_name == github.repository &&
      (
        (github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.head_branch != 'master') ||
        (github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'master')
      )
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
      channel: ${{ steps.version.outputs.channel }}
      prerelease: ${{ steps.version.outputs.prerelease }}
      artifact_bundle: ${{ steps.version.outputs.artifact_bundle }}
      release_name: ${{ steps.version.outputs.release_name }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Detect Channel, Version, and Tag
        id: version
        run: |
          set -euo pipefail

          EVENT="${{ github.event.workflow_run.event }}"
          HEAD_BRANCH="${{ github.event.workflow_run.head_branch }}"

          if [[ "$EVENT" == "pull_request" && "$HEAD_BRANCH" != "master" ]]; then
            CHANNEL="beta"
            PRERELEASE="true"

            git fetch origin master:master

            PR_VERSION=$(tr -d '\n\r' < Version)
            MASTER_VERSION=$(git show master:Version | tr -d '\n\r')

            PR_MAJOR=$(echo "$PR_VERSION" | cut -d. -f1)
            PR_MINOR=$(echo "$PR_VERSION" | cut -d. -f2)
            MASTER_MAJOR=$(echo "$MASTER_VERSION" | cut -d. -f1)
            MASTER_MINOR=$(echo "$MASTER_VERSION" | cut -d. -f2)
            MIN_REQUIRED_MINOR=$((MASTER_MINOR + 1))

            if [[ "$PR_MAJOR" -lt "$MASTER_MAJOR" ]]; then
              echo "PR version major is older than master"
              exit 1
            elif [[ "$PR_MAJOR" -eq "$MASTER_MAJOR" ]] && [[ "$PR_MINOR" -lt "$MIN_REQUIRED_MINOR" ]]; then
              echo "PR version must be at least one minor newer than master"
              exit 1
            fi

            BASE_VERSION="${PR_VERSION}.0"
            LAST_RC_TAG=$(git tag -l "v${BASE_VERSION}-rc.*" --sort=-version:refname | head -1 || true)

            if [[ -z "$LAST_RC_TAG" ]]; then
              RC_NUMBER=1
            else
              LAST_RC="${LAST_RC_TAG##*.}"
              RC_NUMBER=$((LAST_RC + 1))
            fi

            VERSION="${BASE_VERSION}-rc.${RC_NUMBER}"
            TAG="v${VERSION}"
            RELEASE_NAME="RC ${VERSION}"
          elif [[ "$EVENT" == "push" && "$HEAD_BRANCH" == "master" ]]; then
            CHANNEL="stable"
            PRERELEASE="false"

            VERSION_FILE=$(tr -d '\n\r' < Version)
            LAST_TAG=$(git tag -l "v*" --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1 || true)

            if [[ -z "$LAST_TAG" ]]; then
              PATCH=0
            else
              LAST_MAJOR_MINOR=$(echo "$LAST_TAG" | sed 's/^v//' | cut -d. -f1-2)
              if [[ "$VERSION_FILE" == "$LAST_MAJOR_MINOR" ]]; then
                LAST_PATCH="${LAST_TAG##*.}"
                PATCH=$((LAST_PATCH + 1))
              else
                PATCH=0
              fi
            fi

            VERSION="${VERSION_FILE}.${PATCH}"
            TAG="v${VERSION}"
            RELEASE_NAME="Release ${VERSION}"
          else
            echo "Unsupported workflow_run context: event=$EVENT head_branch=$HEAD_BRANCH"
            exit 1
          fi

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists; this run would duplicate a release tag."
            exit 1
          fi

          ARTIFACT_BUNDLE="rdos-${CHANNEL}-${VERSION}"

          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "channel=$CHANNEL" >> $GITHUB_OUTPUT
          echo "prerelease=$PRERELEASE" >> $GITHUB_OUTPUT
          echo "artifact_bundle=$ARTIFACT_BUNDLE" >> $GITHUB_OUTPUT
          echo "release_name=$RELEASE_NAME" >> $GITHUB_OUTPUT

  build-and-test:
    name: Collect Prebuilt Artifacts
    needs: detect-release-context
    runs-on: [self-hosted, linux, rdos-builder]
    env:
      RUNNER_ARTIFACT_ROOT: /var/tmp/rdos-artifacts
    timeout-minutes: 180
    if: >-
      github.repository == 'mstrhakr/RDOS' &&
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.repository.full_name == github.repository &&
      (
        (github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.head_branch != 'master') ||
        (github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'master')
      )
    steps:
      - name: Fetch artifacts from runner storage
        run: |
          set -euo pipefail
          SOURCE_DIR="${RUNNER_ARTIFACT_ROOT}/${{ github.event.workflow_run.head_sha }}"
          test -f "$SOURCE_DIR/rdos-prod.raw.zst"
          test -f "$SOURCE_DIR/rdos-installer.iso"
          cp "$SOURCE_DIR/rdos-prod.raw.zst" ./rdos-prod.raw.zst
          cp "$SOURCE_DIR/rdos-installer.iso" ./rdos-installer.iso
          ls -lh ./rdos-prod.raw.zst ./rdos-installer.iso

      - name: Rename artifacts with version
        id: rename
        run: |
          set -euo pipefail
          VERSION="${{ needs.detect-release-context.outputs.version }}"
          RAW_VERSIONED="rdos-prod-${VERSION}.raw.zst"
          ISO_VERSIONED="rdos-installer-${VERSION}.iso"

          mv rdos-prod.raw.zst "$RAW_VERSIONED"
          mv rdos-installer.iso "$ISO_VERSIONED"

          echo "prod-raw-zst=$RAW_VERSIONED" >> $GITHUB_OUTPUT
          echo "iso-versioned=$ISO_VERSIONED" >> $GITHUB_OUTPUT

          ls -lh "$RAW_VERSIONED" "$ISO_VERSIONED"

      - name: Generate OTA image and manifest
        run: |
          set -euo pipefail
          VERSION="${{ needs.detect-release-context.outputs.version }}"
          CHANNEL="${{ needs.detect-release-context.outputs.channel }}"
          OTA_IMG="${{ steps.rename.outputs.prod-raw-zst }}"
          ISO_VERSIONED="${{ steps.rename.outputs.iso-versioned }}"

          echo "Computing SHA256..."
          SHA256=$(sha256sum "$OTA_IMG" | awk '{print $1}')

          echo "Writing manifest.json..."
          cat > manifest.json <<EOF
          {
            "version": "${VERSION}",
            "channel": "${CHANNEL}",
            "sha256": "${SHA256}",
            "artifact": "${OTA_IMG}",
            "min_base": "3.0"
          }
          EOF

          ls -lh "$OTA_IMG" "$ISO_VERSIONED" manifest.json

      - name: Upload versioned artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.detect-release-context.outputs.artifact_bundle }}
          path: |
            rdos-prod-*.raw.zst
            rdos-installer-*.iso
            manifest.json
          retention-days: 30

      - name: Cleanup runner-stored source artifacts
        if: always()
        run: |
          set -euo pipefail
          SOURCE_DIR="${RUNNER_ARTIFACT_ROOT}/${{ github.event.workflow_run.head_sha }}"
          rm -rf "$SOURCE_DIR"

  create-release:
    name: Create GitHub Release
    needs: [detect-release-context, build-and-test]
    runs-on: [self-hosted, linux, rdos-builder]
    if: >-
      github.repository == 'mstrhakr/RDOS' &&
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.repository.full_name == github.repository &&
      (
        (github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.head_branch != 'master') ||
        (github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'master')
      )
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.detect-release-context.outputs.artifact_bundle }}
          path: ./release-artifacts

      - name: Create git tag
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          TAG="${{ needs.detect-release-context.outputs.tag }}"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.detect-release-context.outputs.tag }}
          name: ${{ needs.detect-release-context.outputs.release_name }}
          body: |
            RDOS ${{ needs.detect-release-context.outputs.channel }} release ${{ needs.detect-release-context.outputs.version }}
            
            - **Production Raw (compressed)**: rdos-prod-${{ needs.detect-release-context.outputs.version }}.raw.zst (OTA update payload)
            - **Installer ISO**: rdos-installer-${{ needs.detect-release-context.outputs.version }}.iso (Clonezilla-based installer)
            - **Manifest**: manifest.json (${{ needs.detect-release-context.outputs.channel }} OTA metadata with SHA256 checksum)
            
            See [docs/building.md](docs/building.md) and [Readme.md](Readme.md) for deployment instructions.
          files: |
            release-artifacts/rdos-prod-*.raw.zst
            release-artifacts/rdos-installer-*.iso
            release-artifacts/manifest.json
          draft: false
          prerelease: ${{ needs.detect-release-context.outputs.prerelease == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
