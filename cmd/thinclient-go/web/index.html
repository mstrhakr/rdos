<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RDOS Control Surface</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="backdrop"></div>
    <main class="app app-landing" aria-label="RDOS control surface">
      <button id="openSettings" class="corner-icon" type="button" aria-label="Open settings">
        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M19.4 13a7.8 7.8 0 0 0 .1-2l2-1.6a1 1 0 0 0 .2-1.3l-1.9-3.2a1 1 0 0 0-1.2-.4l-2.4 1a7.7 7.7 0 0 0-1.7-1l-.4-2.6a1 1 0 0 0-1-.9h-3.8a1 1 0 0 0-1 .9l-.4 2.6c-.6.2-1.2.6-1.7 1l-2.4-1a1 1 0 0 0-1.2.4L2.3 8.1a1 1 0 0 0 .2 1.3l2 1.6a7.8 7.8 0 0 0 .1 2l-2 1.6a1 1 0 0 0-.2 1.3l1.9 3.2a1 1 0 0 0 1.2.4l2.4-1c.5.4 1.1.8 1.7 1l.4 2.6a1 1 0 0 0 1 .9h3.8a1 1 0 0 0 1-.9l.4-2.6c.6-.2 1.2-.6 1.7-1l2.4 1a1 1 0 0 0 1.2-.4l1.9-3.2a1 1 0 0 0-.2-1.3l-2-1.6ZM12 15.5A3.5 3.5 0 1 1 12 8.5a3.5 3.5 0 0 1 0 7Z"/>
        </svg>
      </button>

      <div class="corner-clock" aria-live="polite">
        <span class="clock-label">Time</span>
        <strong id="cornerClock">--:--</strong>
      </div>

      <section class="panel landing-login" aria-label="RDP login">
        <div class="landing-head">
          <p class="eyebrow">RDOS thin client</p>
          <h1>Login</h1>
          <p class="subhead">Quick connect to your remote desktop.</p>
          <p id="health" class="service-health">checking service...</p>
        </div>

        <div class="form-grid landing-form">
          <label>Server<input id="server" placeholder="rdp.example.local" /></label>
          <label>Username<input id="username" placeholder="username" /></label>
          <label>Password<input id="password" type="password" placeholder="password" /></label>
          <label>Domain<input id="domain" placeholder="domain" /></label>
        </div>

        <div class="actions">
          <button id="connect" type="button">Connect</button>
          <button id="disconnect" class="secondary" type="button">Disconnect</button>
        </div>

        <div class="status-card compact" id="sessionState">session: idle</div>
      </section>
    </main>

    <aside class="modal" id="settingsModal" aria-hidden="true">
      <div class="modal-surface" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
        <header class="modal-head">
          <div>
            <p class="eyebrow">Settings</p>
            <h2 id="settingsTitle">Everything the device needs</h2>
          </div>
          <button id="closeSettings" class="secondary">Close</button>
        </header>

        <div class="tabs" id="settingsTabs" role="tablist"></div>
        <div class="tab-panels" id="settingsPanels"></div>

        <footer class="modal-foot">
          <div class="modal-foot-note" id="settingsNote">Changes save to tcconfig.</div>
          <div class="actions tight">
            <button id="reloadSettings" class="secondary">Reload</button>
            <button id="saveSettings">Save settings</button>
          </div>
        </footer>
      </div>
    </aside>

    <script src="/app.js"></script>
  </body>
</html>
